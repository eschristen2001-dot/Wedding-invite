<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  min-height: -webkit-fill-available;
  overflow: hidden;
  background: linear-gradient(135deg, #f7e7d3, #f2d8b5);
  font-family: 'Playfair Display', serif;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation; /* FIXED */
  user-select: none;
  -webkit-user-select: none;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

.card-container {
  display: none;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
  position: absolute;
  inset: 0;
  touch-action: pinch-zoom; /* FIXED */
  z-index: 15;
}

.card {
  width: min(86vw, 400px);
  aspect-ratio: 5 / 7;
  transform-style: preserve-3d;
  transform-origin: center center;
  transition: transform 0.05s linear;
  cursor: grab;
  will-change: transform;
}

</style>
</head>
<body>

<div class="card-container" id="cardContainer">
  <div class="card" id="card">
    <div class="side front" style="background-image:url('front.JPEG')"></div>
    <div class="side back"  style="background-image:url('back.JPEG')"></div>
  </div>
</div>

<script>
(function () {
  let scale = 1;
  let panX = 0;
  let panY = 0;

  const card = document.getElementById('card');
  const cardContainer = document.getElementById('cardContainer');

  function applyTransform() {
    card.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  }

  function zoomAt(x, y, factor) {
    const newScale = Math.min(4, Math.max(1, scale * factor));

    const rect = cardContainer.getBoundingClientRect(); /* FIXED */
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    const dx = x - cx;
    const dy = y - cy;

    panX += dx * (1 - newScale / scale);
    panY += dy * (1 - newScale / scale);

    scale = newScale;

    clampPan();
    applyTransform();
  }

  function clampPan() {
    const rect = cardContainer.getBoundingClientRect(); /* FIXED */

    const maxX = (rect.width * (scale - 1)) / 2;
    const maxY = (rect.height * (scale - 1)) / 2;

    panX = Math.min(maxX, Math.max(-maxX, panX));
    panY = Math.min(maxY, Math.max(-maxY, panY));
  }

  let lastDist = 0;

  cardContainer.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);

      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

      if (lastDist > 0) {
        zoomAt(midX, midY, dist / lastDist);
      }

      lastDist = dist;
    }
  }, { passive: false });

  cardContainer.addEventListener('touchend', () => {
    lastDist = 0;
  });

})();
</script>
</body>
</html>

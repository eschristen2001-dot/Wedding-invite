<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invite</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family:sans-serif;
  background: linear-gradient(135deg, #f7e7d3, #f2d8b5);
}

/* background texture */
body::before {
  content:"";
  position:absolute;
  inset:0;
  background-image:url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  opacity:0.2;
  pointer-events:none;
}

/* =========================
   AUDIO (hidden)
========================= */
audio {
  display:none;
}

/* =========================
   ENVELOPE
========================= */
.envelope {
  width:340px;
  height:230px;
  position:absolute;
  cursor:pointer;
  perspective:1000px;
}

.envelope-body {
  position:absolute;
  width:100%;
  height:100%;
  background: linear-gradient(145deg, #f4c7b8, #c7d6c2);
  border-radius:10px;
  box-shadow:0 18px 35px rgba(0,0,0,0.18);
}

.envelope-body::after {
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:60%;
  background:#e8d2c4;
  clip-path: polygon(0 0, 50% 40%, 100% 0, 100% 100%, 0 100%);
  opacity:0.8;
}

.flap {
  position:absolute;
  width:100%;
  height:100%;
  background: linear-gradient(145deg, #f2b8a8, #bcd3bc);
  clip-path: polygon(0 0, 50% 55%, 100% 0);
  transform-origin: top center;
  transition: transform 1.1s cubic-bezier(.2,.8,.2,1);
  z-index:3;
}

.envelope.open .flap {
  transform: rotateX(165deg);
}

.envelope.fall {
  transform: translateY(900px) rotate(18deg);
  opacity:0;
  transition: all 1.6s cubic-bezier(.2,.8,.2,1);
}

/* =========================
   HEART SEAL
========================= */
.seal {
  position:absolute;
  width:45px;
  height:45px;
  background:#d97b7b;
  left:50%;
  top:52%;
  transform:translate(-50%, -50%) rotate(45deg);
  z-index:10;
  transition: all 1.4s cubic-bezier(.2,.9,.2,1);
}

.seal::before,
.seal::after {
  content:"";
  position:absolute;
  width:45px;
  height:45px;
  background:#d97b7b;
  border-radius:50%;
}

.seal::before { top:-22px; left:0; }
.seal::after { left:-22px; top:0; }

.seal.crack {
  transform: translate(-50%, -50%) rotate(45deg) scale(0.92);
}

.seal.drop {
  transform: translate(-50%, -50%) rotate(45deg) translateY(420px) rotate(240deg);
  opacity:0;
}

/* =========================
   CARD
========================= */
.card-container {
  display:none;
  position:absolute;
  perspective:1400px;
  touch-action:none;
}

.card {
  width:min(92vw, 720px);
  aspect-ratio: 5 / 7;
  position:relative;
  transform-style:preserve-3d;
  cursor:grab;
  transition: transform 0.05s linear;
}

.side {
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;

  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;

  background-color:white;
  border-radius:14px;
  box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

.back {
  transform:rotateY(180deg);
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="openSound" src="envelope.mp3"></audio>
<audio id="music" src="music.mp3" loop></audio>

<!-- ENVELOPE -->
<div class="envelope" id="envelope" onclick="openEnvelope()">
  <div class="envelope-body"></div>
  <div class="flap"></div>
  <div class="seal" id="seal"></div>
</div>

<!-- CARD -->
<div class="card-container" id="cardContainer">
  <div class="card" id="card">
    <div class="side front" style="background-image:url('front.JPEG')"></div>
    <div class="side back" style="background-image:url('back.JPEG')"></div>
  </div>
</div>

<script>
let opened = false;

/* =========================
   OPEN ENVELOPE (WITH SOUND)
========================= */
function openEnvelope() {
  if (opened) return;
  opened = true;

  const env = document.getElementById("envelope");
  const seal = document.getElementById("seal");
  const cardContainer = document.getElementById("cardContainer");

  const sound = document.getElementById("openSound");
  const music = document.getElementById("music");

  /* 🎵 play envelope sound */
  sound.currentTime = 0;
  sound.play();

  /* 🎶 fade in music */
  music.volume = 0;
  music.play();

  let v = 0;
  const fade = setInterval(() => {
    if (v < 0.4) {
      v += 0.02;
      music.volume = v;
    } else {
      clearInterval(fade);
    }
  }, 80);

  /* seal crack + fall */
  seal.classList.add("crack");

  setTimeout(() => {
    seal.classList.add("drop");
  }, 200);

  /* envelope opens while seal falls */
  setTimeout(() => {
    env.classList.add("open");
  }, 350);

  setTimeout(() => {
    env.classList.add("fall");
  }, 1100);

  setTimeout(() => {
    cardContainer.style.display = "block";
  }, 1300);
}

/* =========================
   ROTATION PHYSICS
========================= */
const card = document.getElementById("card");

let rot = 0;
let velocity = 0;
let dragging = false;
let lastX = 0;

/* mouse */
card.addEventListener("mousedown", e => {
  dragging = true;
  lastX = e.clientX;
  velocity = 0;
});

/* touch */
card.addEventListener("touchstart", e => {
  dragging = true;
  lastX = e.touches[0].clientX;
  velocity = 0;
}, { passive: true });

window.addEventListener("mousemove", e => {
  if (!dragging) return;

  let dx = e.clientX - lastX;
  lastX = e.clientX;

  rot += dx * 0.55;
  velocity = dx * 0.55;

  card.style.transform = `rotateY(${rot}deg)`;
});

window.addEventListener("touchmove", e => {
  if (!dragging) return;

  let x = e.touches[0].clientX;
  let dx = x - lastX;
  lastX = x;

  rot += dx * 0.55;
  velocity = dx * 0.55;

  card.style.transform = `rotateY(${rot}deg)`;
}, { passive: true });

window.addEventListener("mouseup", endDrag);
window.addEventListener("touchend", endDrag);

function endDrag() {
  dragging = false;
  inertia();
}

function inertia() {
  if (Math.abs(velocity) < 0.05) {
    snap();
    return;
  }

  rot += velocity;
  velocity *= 0.92;

  card.style.transform = `rotateY(${rot}deg)`;
  requestAnimationFrame(inertia);
}

function snap() {
  const snapAngle = Math.round(rot / 180) * 180;
  rot = snapAngle;

  card.style.transition = "transform 0.6s cubic-bezier(.2,.8,.2,1)";
  card.style.transform = `rotateY(${rot}deg)`;

  setTimeout(() => {
    card.style.transition = "transform 0.05s linear";
  }, 600);
}
</script>

</body>
</html>

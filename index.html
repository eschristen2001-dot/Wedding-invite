<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background: linear-gradient(135deg, #f7e7d3, #f2d8b5);
  font-family: 'Playfair Display', serif;
}

body::after {
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.15));
  pointer-events:none;
}

/* INTRO */
.intro {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:20;
  animation: fadeOut 2.2s ease 2.8s forwards;
}
.intro-text {
  font-family:'Great Vibes', cursive;
  font-size: clamp(52px, 9vw, 92px);
  color:#d4af37;
  opacity:0;
  animation: fadeIn 2s forwards;
}

/* TAP HINT */
.tap-hint {
  position:absolute;
  bottom: 90px;
  font-size: clamp(22px, 4.5vw, 32px);
  opacity:0;
  transition:opacity 1s;
  text-align:center;
  width:100%;
}

/* REPLAY */
#replay {
  position:absolute;
  top:20px;
  right:20px;
  font-size: clamp(18px, 3vw, 24px);
  cursor:pointer;
  display:none;
  opacity:0.75;
  z-index:50;
}

/* ENVELOPE */
.envelope {
  width: clamp(300px, 82vw, 360px);
  height: clamp(210px, 58vw, 250px);
  position:absolute;
  cursor:pointer;
  perspective:1200px;
  opacity:0;
  transform: translateY(20px);
  animation:fadeIn 1s 2.8s forwards;
}
.envelope-body {
  position:absolute;
  width:100%;
  height:100%;
  background: linear-gradient(145deg, #f4c7b8, #c7d6c2);
  border-radius:12px;
}
.flap {
  position:absolute;
  width:100%;
  height:100%;
  background: linear-gradient(145deg, #f2b8a8, #bcd3bc);
  clip-path: polygon(0 0, 50% 58%, 100% 0);
  transform-origin: top center;
  transition: transform 1.2s cubic-bezier(0.25, 0.8, 0.25, 1);
  z-index:3;
}
.envelope.open .flap {
  transform: rotateX(-168deg);
}
.envelope.fall {
  transform: translateY(950px) rotate(20deg);
  opacity:0;
  transition: all 1.7s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.seal {
  position: absolute;
  width: 56px;
  height: 56px;
  left: 50%;
  top: 51%;
  transform: translate(-50%, -50%);
  z-index: 10;
  cursor: pointer;
}

/* heart base using rotation method */
.seal {
  background: #d97b7b;
  transform: translate(-50%, -50%) rotate(-45deg);
  border-radius: 8px;
}

/* two lobes */
.seal::before,
.seal::after {
  content: "";
  position: absolute;
  width: 56px;
  height: 56px;
  background: #d97b7b;
  border-radius: 50%;
}

/* left circle */
.seal::before {
  top: -28px;
  left: 0;
}

/* right circle */
.seal::after {
  left: 28px;
  top: 0;
}

/* CRACK */
.seal.crack {
  transform: translate(-50%, -50%) rotate(-45deg) scale(0.88);
  transition: transform 0.35s ease;
}

/* DROP */
.seal.drop {
  transform: translate(-50%, -50%) rotate(-45deg) translateY(500px) scale(0.75);
  opacity: 0;
  transition: all 1.5s cubic-bezier(0.25, 0.8, 0.25, 1);
}

/* CARD */
.card-container {
  display:none;
  perspective:1600px;
  touch-action: none;
}
.card {
  width: min(92vw, 720px);
  aspect-ratio: 5 / 7;
  transform-style: preserve-3d;
  transition: transform 0.04s linear;
}
.side {
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility: hidden;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}
.back { transform: rotateY(180deg); }

/* HINT */
.hint {
  position:absolute;
  bottom: 25px;
  font-size: clamp(15px, 3vw, 19px);
  opacity:0.6;
  display:none;
  text-align:center;
  width:100%;
}

/* Animations */
@keyframes fadeIn { to { opacity:1; } }
@keyframes fadeOut { to { opacity:0; visibility:hidden; } }
</style>
</head>
<body>

<div class="intro"><div class="intro-text">The Christens</div></div>

<audio id="openSound" src="envelope.mp3" preload="auto"></audio>
<audio id="music" src="music.mp3" loop preload="auto"></audio>

<div class="tap-hint" id="tapHint">Tap the seal 💌</div>
<div id="replay">Replay</div>

<div class="envelope" id="envelope">
  <div class="envelope-body"></div>
  <div class="flap"></div>
  <div class="seal" id="seal"></div>
</div>

<div class="card-container" id="cardContainer">
  <div class="card" id="card">
    <div class="side front" style="background-image:url('front.JPEG')"></div>
    <div class="side back" style="background-image:url('back.JPEG')"></div>
  </div>
</div>

<div class="hint" id="hint">Swipe left/right to rotate • Pinch to zoom</div>

<script>
const isMobile = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

const envelope = document.getElementById("envelope");
const seal = document.getElementById("seal");
const cardContainer = document.getElementById("cardContainer");
const card = document.getElementById("card");
const tapHint = document.getElementById("tapHint");
const replay = document.getElementById("replay");
const hint = document.getElementById("hint");
const openSound = document.getElementById("openSound");
const music = document.getElementById("music");

let opened = false;
let rot = 0;
let dragging = false;
let lastX = 0;

tapHint.textContent = isMobile ? "Tap the seal 💌" : "Click the seal 💌";

setTimeout(() => { tapHint.style.opacity = 1; }, 3200);

replay.addEventListener("click", () => location.reload());
replay.addEventListener("touchstart", (e) => { e.preventDefault(); location.reload(); });

function openEnvelope() {
  if (opened) return;
  opened = true;

  tapHint.style.opacity = 0;
  openSound.play().catch(() => {});

  seal.classList.add("crack");
  setTimeout(() => seal.classList.add("drop"), 180);

  setTimeout(() => envelope.classList.add("open"), 380);
  setTimeout(() => envelope.classList.add("fall"), 1150);

  setTimeout(() => {
    music.volume = 0;
    music.play().catch(() => {});
    let v = 0;
    const fade = setInterval(() => {
      v += 0.025;
      music.volume = Math.min(v, 0.45);
      if (v >= 0.45) clearInterval(fade);
    }, 70);
  }, 450);

  setTimeout(() => {
    cardContainer.style.display = "block";
    hint.style.display = "block";
    replay.style.display = "block";
  }, 1450);
}

envelope.addEventListener("click", openEnvelope);
envelope.addEventListener("touchstart", (e) => {
  e.preventDefault();
  openEnvelope();
}, { passive: false });

// Card rotation
function updateCard() {
  card.style.transform = `rotateY(${rot}deg)`;
}

card.addEventListener("mousedown", e => {
  dragging = true;
  lastX = e.clientX;
});

card.addEventListener("touchstart", e => {
  dragging = true;
  lastX = e.touches[0].clientX;
}, { passive: false });

window.addEventListener("mousemove", e => {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  lastX = e.clientX;
  rot += dx * 0.65;
  updateCard();
});

window.addEventListener("touchmove", e => {
  if (!dragging) return;
  e.preventDefault();
  const dx = e.touches[0].clientX - lastX;
  lastX = e.touches[0].clientX;
  rot += dx * 0.65;
  updateCard();
}, { passive: false });

window.addEventListener("mouseup", () => dragging = false);
window.addEventListener("touchend", () => dragging = false);
</script>
</body>
</html>

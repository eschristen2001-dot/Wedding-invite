<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  min-height: -webkit-fill-available;
  overflow: hidden;
  background: linear-gradient(135deg, #f8e9d9, #f4d9b8);
  font-family: 'Playfair Display', serif;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
  user-select: none;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

body::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, transparent 50%, rgba(0,0,0,0.12));
  pointer-events: none;
}

/* INTRO */
.intro {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 20;
  animation: fadeOut 2.3s ease 2.8s forwards;
  pointer-events: none;
}
.intro-text {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(54px, 9.5vw, 96px);
  color: #d4af37;
  text-shadow: 0 3px 8px rgba(0,0,0,0.15);
  opacity: 0;
  animation: fadeIn 2.2s forwards;
}

/* TAP HINT */
.tap-hint {
  position: absolute;
  bottom: clamp(70px, 14vh, 100px);
  font-size: clamp(19px, 4.2vw, 29px);
  opacity: 0;
  transition: opacity 1.2s ease;
  text-align: center;
  width: 100%;
  color: #5a3e28;
  letter-spacing: 0.5px;
  pointer-events: none;
  z-index: 10;
}

/* REPLAY */
#replay {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: clamp(17px, 3vw, 23px);
  cursor: pointer;
  display: none;
  opacity: 0.8;
  z-index: 50;
  color: #5a3e28;
  padding: 10px 16px;
  border-radius: 30px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(8px);
  transition: all 0.2s ease;
}
#replay:hover { opacity: 1; transform: scale(1.05); }

/* ENVELOPE */
.envelope {
  width: clamp(290px, 80vw, 370px);
  height: clamp(200px, 55vw, 260px);
  position: absolute;
  cursor: pointer;
  perspective: 1400px;
  opacity: 0;
  transform: translateY(25px);
  animation: fadeIn 1.1s 2.8s forwards;
  z-index: 10;
  will-change: transform, opacity;
}
.envelope-body {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #f4c7b8, #c7d6c2);
  border-radius: 14px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #f2b8a8, #bcd3bc);
  clip-path: polygon(0 0, 50% 60%, 100% 0);
  transform-origin: top center;
  transition: transform 1.25s cubic-bezier(0.23, 1, 0.32, 1);
  z-index: 3;
  border-radius: 14px 14px 0 0;
}
.envelope.open .flap {
  transform: rotateX(-165deg);
}
.envelope.fall {
  transform: translateY(130vh) rotate(22deg);
  opacity: 0;
  transition: all 1.8s cubic-bezier(0.25, 0.8, 0.25, 1);
}

/* SEAL - preserved exactly as you like */
.seal {
  position: absolute;
  width: 56px;
  height: 56px;
  left: 50%;
  top: 51%;
  transform: translate(-50%, -50%) rotate(-45deg);
  z-index: 10;
  cursor: pointer;
  background: #d97b7b;
  border-radius: 8px;
  will-change: transform, opacity;
  transition: transform 0.35s ease;
}
.seal::before,
.seal::after {
  content: "";
  position: absolute;
  width: 56px;
  height: 56px;
  background: #d97b7b;
  border-radius: 50%;
}
.seal::before { top: -28px; left: 0; }
.seal::after { left: 28px; top: 0; }
.seal.crack {
  transform: translate(-50%, -50%) rotate(-45deg) scale(0.88);
}
.seal.drop {
  transform: translate(-50%, -50%) rotate(-45deg) translateY(500px) scale(0.75);
  opacity: 0;
  transition: all 1.5s cubic-bezier(0.25, 0.8, 0.25, 1);
}

/* CARD */
.card-container {
  display: none;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
  position: absolute;
  inset: 0;
  touch-action: none;
  z-index: 15;
}
.card {
  width: min(88vw, 420px);
  aspect-ratio: 5 / 7;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(0.25, 0.8, 0.25, 1);
  cursor: grab;
  will-change: transform;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}
.card:active { cursor: grabbing; }
.side {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  border-radius: 18px;
  box-shadow: inset 0 0 40px rgba(0,0,0,0.15);
}
.back { transform: rotateY(180deg); }

/* HINT */
.hint {
  position: absolute;
  bottom: clamp(18px, 5vh, 32px);
  font-size: clamp(14px, 3vw, 18px);
  opacity: 0.6;
  display: none;
  text-align: center;
  width: 100%;
  color: #5a3e28;
  pointer-events: none;
  z-index: 16;
  letter-spacing: 0.3px;
}

/* Animations */
@keyframes fadeIn { 
  to { opacity: 1; transform: translateY(0); } 
}
@keyframes fadeOut { 
  to { opacity: 0; visibility: hidden; } 
}
</style>
</head>
<body>

<div class="intro"><div class="intro-text">The Christens</div></div>
<audio id="openSound" src="envelope.mp3" preload="auto"></audio>
<audio id="music" src="music.mp3" loop preload="auto"></audio>

<div class="tap-hint" id="tapHint">Tap the seal 💌</div>
<div id="replay">↺ Replay</div>

<div class="envelope" id="envelope">
  <div class="envelope-body"></div>
  <div class="flap"></div>
  <div class="seal" id="seal"></div>
</div>

<div class="card-container" id="cardContainer">
  <div class="card" id="card">
    <div class="side front" style="background-image:url('front.JPEG')"></div>
    <div class="side back" style="background-image:url('back.JPEG')"></div>
  </div>
</div>

<div class="hint" id="hint">Swipe to rotate • Release to snap • Double tap to reset</div>

<script>
(function () {
  'use strict';

  const isMobile = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 1);

  const envelope = document.getElementById('envelope');
  const seal = document.getElementById('seal');
  const cardContainer = document.getElementById('cardContainer');
  const card = document.getElementById('card');
  const tapHint = document.getElementById('tapHint');
  const replayBtn = document.getElementById('replay');
  const hint = document.getElementById('hint');
  const openSound = document.getElementById('openSound');
  const music = document.getElementById('music');

  tapHint.textContent = isMobile ? 'Tap the seal 💌' : 'Click the seal 💌';

  setTimeout(() => { tapHint.style.opacity = 1; }, 3300);

  replayBtn.addEventListener('click', () => location.reload());
  replayBtn.addEventListener('touchstart', (e) => { e.preventDefault(); location.reload(); }, { passive: false });

  let opened = false;
  let rot = 0;
  let scale = 1.0;
  let panX = 0;
  let panY = 0;
  let snapTimeout = null;
  let lastTapTime = 0;

  const MIN_SCALE = 1.0;
  const MAX_SCALE = 5.0;

  function applyTransform() {
    card.style.transform = `translate(${panX}px, ${panY}px) rotateY(${rot}deg) scale(${scale})`;
  }

  function resetTransform() {
    rot = 0;
    scale = 1.0;
    panX = 0;
    panY = 0;
    applyTransform();
  }

  function snapToNearestSide() {
    const normalized = ((rot % 360) + 360) % 360;
    rot = (normalized < 90 || normalized > 270) 
      ? Math.round(rot / 360) * 360 
      : Math.round(rot / 360) * 360 + 180;
    applyTransform();
  }

  function zoomAt(clientX, clientY, factor) {
    const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * factor));
    if (newScale === scale) return;

    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    const dx = clientX - cx;
    const dy = clientY - cy;

    panX += dx * (1 - newScale / scale);
    panY += dy * (1 - newScale / scale);

    scale = newScale;
    applyTransform();
  }

  function openEnvelope() {
    if (opened) return;
    opened = true;

    tapHint.style.opacity = 0;
    openSound.play().catch(() => {});

    seal.classList.add('crack');
    setTimeout(() => seal.classList.add('drop'), 180);
    setTimeout(() => envelope.classList.add('open'), 380);
    setTimeout(() => envelope.classList.add('fall'), 1150);

    setTimeout(() => {
      music.volume = 0;
      music.play().catch(() => {});
      let v = 0;
      const fade = setInterval(() => {
        v += 0.025;
        music.volume = Math.min(v, 0.45);
        if (v >= 0.45) clearInterval(fade);
      }, 70);
    }, 450);

    setTimeout(() => {
      cardContainer.style.display = 'flex';
      hint.style.display = 'block';
      replayBtn.style.display = 'block';
      resetTransform();
    }, 1500);
  }

  envelope.addEventListener('click', openEnvelope);
  envelope.addEventListener('touchstart', (e) => {
    e.preventDefault();
    openEnvelope();
  }, { passive: false });

  /* ====================== GESTURES ====================== */
  let lastPinchDist = 0;
  let isDragging = false;

  cardContainer.addEventListener('touchstart', (e) => {
    isDragging = true;
    const now = Date.now();
    if (now - lastTapTime < 300) {
      resetTransform();
    }
    lastTapTime = now;

    if (e.touches.length === 2) {
      lastPinchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
    if (snapTimeout) clearTimeout(snapTimeout);
  }, { passive: false });

  cardContainer.addEventListener('touchmove', (e) => {
    if (!isDragging) return;

    if (e.touches.length === 1) {
      const dx = e.touches[0].clientX - (window.lastTouchX || e.touches[0].clientX);
      rot += dx * 0.68;
      applyTransform();
      window.lastTouchX = e.touches[0].clientX;
    } 
    else if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );

      if (lastPinchDist > 0) {
        const factor = dist / lastPinchDist;
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        zoomAt(midX, midY, factor);
      }
      lastPinchDist = dist;
    }
  }, { passive: false });

  cardContainer.addEventListener('touchend', () => {
    isDragging = false;
    lastPinchDist = 0;
    window.lastTouchX = null;

    if (snapTimeout) clearTimeout(snapTimeout);
    snapTimeout = setTimeout(snapToNearestSide, 480);
  });

  // Desktop mouse support
  let mouseDragging = false;
  let lastMouseX = 0;

  card.addEventListener('mousedown', (e) => {
    mouseDragging = true;
    lastMouseX = e.clientX;
    if (snapTimeout) clearTimeout(snapTimeout);
  });

  window.addEventListener('mousemove', (e) => {
    if (!mouseDragging) return;
    const dx = e.clientX - lastMouseX;
    rot += dx * 0.68;
    applyTransform();
    lastMouseX = e.clientX;
  });

  window.addEventListener('mouseup', () => {
    mouseDragging = false;
    if (snapTimeout) clearTimeout(snapTimeout);
    snapTimeout = setTimeout(snapToNearestSide, 480);
  });

  // Double click for desktop
  card.addEventListener('dblclick', resetTransform);

})();
</script>
</body>
</html>
